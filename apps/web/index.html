<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selene-Insight — Starlink Constellation Tracker</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="cesium-container"></div>

    <div id="sidebar">
      <div class="sidebar-header">
        <div class="logo">SELENE-INSIGHT</div>
        <div class="logo-sub">Starlink Constellation Tracker</div>
        <div id="connection-status" class="status-live">LIVE</div>
      </div>

      <div class="section">
        <h3>CONSTELLATION</h3>
        <div class="big-value" id="sat-count">--</div>
        <div class="row"><span class="label">ACTIVE SATELLITES</span></div>
        <div id="shell-list"></div>
      </div>

      <div class="section">
        <h3>SELECTED SATELLITE</h3>
        <div id="sat-detail">
          <span class="dim">Click a satellite to see details</span>
        </div>
      </div>

      <div class="section">
        <h3 class="h-orange">ANOMALIES</h3>
        <div id="anomaly-list"><span class="dim">No anomalies</span></div>
      </div>

      <div class="section">
        <div class="legend-bar"></div>
        <div class="legend-labels"><span>340 km</span><span>ALTITUDE</span><span>570 km</span></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
